    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-a4d64d52-0641.cloud.databricks.com
    variables:
      catalog: bakehouse_analytics_dev
      schema: test_rnd
  prod:
    mode: production
    workspace:
      host: https://dbc-a4d64d52-0641.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/rahulmhatre173@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/rahulmhatre173@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: bakehouse_analytics_dev
      schema: test_rnd
    permissions:
      - user_name: rahulmhatre173@gmail.com
        level: CAN_MANAGE
